<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — GameRoom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;800&family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede8; --muted: #6b6880; --accent: #e8c547;
    --accent2: #7c6af5; --green: #4fcf8e; --red: #f05a5a;
    --font-display: 'DM Serif Display', serif;
    --font-ui: 'Syne', sans-serif; --font-th: 'Noto Sans Thai', sans-serif;
  }
  body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-th); padding: 32px 16px 80px; }
  .blob { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .blob-1 { width: 400px; height: 400px; background: rgba(124,106,245,0.1); top: -100px; right: -100px; }
  .blob-2 { width: 300px; height: 300px; background: rgba(232,197,71,0.06); bottom: 0; left: -80px; }
  .wrapper { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
  .back-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 999px; font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; }
  .back-btn:hover { color: var(--text); border-color: var(--border-hover); }
  .page-title { font-family: var(--font-display); font-size: 32px; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
  .tab-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 20px; border-radius: 999px; font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .tab-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .tab-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* Top 3 */
  .top3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 32px; }
  .top3-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px 16px; text-align: center; position: relative; overflow: hidden; }
  .top3-card.rank-1 { border-color: rgba(232,197,71,0.4); background: linear-gradient(135deg, #1a1500 0%, #12121a 100%); }
  .top3-card.rank-2 { border-color: rgba(180,180,180,0.3); }
  .top3-card.rank-3 { border-color: rgba(180,100,50,0.3); }
  .rank-badge { font-size: 32px; margin-bottom: 8px; display: block; }
  .top3-name { font-family: var(--font-display); font-size: 18px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .top3-wins { font-family: var(--font-ui); font-size: 13px; color: var(--muted); }
  .top3-wins span { color: var(--green); font-weight: 700; font-size: 20px; }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
  .table-header { display: grid; padding: 14px 20px; border-bottom: 1px solid var(--border); font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .table-header.leaderboard-grid { grid-template-columns: 48px 1fr 80px 80px 80px; }
  .table-header.history-grid { grid-template-columns: 1fr 80px 120px 140px; }
  .table-row { display: grid; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: rgba(255,255,255,0.02); }
  .table-row.leaderboard-grid { grid-template-columns: 48px 1fr 80px 80px 80px; }
  .table-row.history-grid { grid-template-columns: 1fr 80px 120px 140px; }
  .rank-num { font-family: var(--font-display); font-size: 18px; color: var(--muted); }
  .rank-num.top { color: var(--accent); }
  .player-info { display: flex; align-items: center; gap: 10px; }
  .player-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
  .player-display-name { font-weight: 600; font-size: 15px; }
  .stat { font-family: var(--font-ui); font-size: 14px; font-weight: 600; }
  .stat.wins { color: var(--green); }
  .stat.losses { color: var(--red); }
  .stat.draws { color: var(--muted); }
  .result-badge { display: inline-flex; padding: 4px 12px; border-radius: 999px; font-family: var(--font-ui); font-size: 12px; font-weight: 700; }
  .result-win  { background: rgba(79,207,142,0.15); color: var(--green); }
  .result-loss { background: rgba(240,90,90,0.15);  color: var(--red); }
  .result-draw { background: rgba(107,104,128,0.2); color: var(--muted); }
  .game-tag { font-size: 13px; color: var(--muted); }
  .time-text { font-size: 12px; color: var(--muted); font-family: var(--font-ui); }
  .opponent-text { font-size: 14px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; display: block; }
  .empty-text { font-size: 15px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-family: var(--font-ui); }

  /* Search */
  .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
  .search-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 11px 16px; color: var(--text); font-family: var(--font-th); font-size: 15px; outline: none; transition: border-color 0.2s; }
  .search-input:focus { border-color: var(--accent2); }
  .search-input::placeholder { color: var(--muted); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.4s ease both; }

  @media (max-width: 600px) {
    .top3 { grid-template-columns: 1fr; }
    .table-header.leaderboard-grid, .table-row.leaderboard-grid { grid-template-columns: 40px 1fr 60px 60px; }
    .table-header.leaderboard-grid .hide-mobile, .table-row.leaderboard-grid .hide-mobile { display: none; }
  }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="wrapper">
  <div class="top-bar">
    <a href="index.html" class="back-btn">← กลับ</a>
    <div class="page-title">🏆 Leaderboard</div>
    <div style="width:80px"></div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('leaderboard', this)">🏆 อันดับ</button>
    <button class="tab-btn" onclick="switchTab('history', this)">📋 ประวัติการเล่น</button>
  </div>

  <!-- Leaderboard Tab -->
  <div id="leaderboardTab" class="fade-up">
    <div class="tabs" style="margin-bottom:20px">
      <button class="tab-btn active" onclick="filterGame('all', this)">ทั้งหมด</button>
      <button class="tab-btn" onclick="filterGame('tictactoe', this)">⭕ โอ-ซี</button>
      <button class="tab-btn" onclick="filterGame('gomoku', this)">⚫ Gomoku</button>
      <button class="tab-btn" onclick="filterGame('battleship', this)">🚢 Battle Ship</button>
    </div>

    <div class="top3" id="top3"></div>

    <div class="table-wrap">
      <div class="table-header leaderboard-grid">
        <div>#</div>
        <div>ผู้เล่น</div>
        <div>ชนะ</div>
        <div>แพ้</div>
        <div class="hide-mobile">เสมอ</div>
      </div>
      <div id="leaderboardList"><div class="loading">กำลังโหลด...</div></div>
    </div>
  </div>

  <!-- History Tab -->
  <div id="historyTab" style="display:none" class="fade-up">
    <div class="search-bar">
      <input class="search-input" id="searchInput" placeholder="ค้นหาชื่อผู้เล่น..." oninput="searchHistory()">
    </div>
    <div class="table-wrap">
      <div class="table-header history-grid">
        <div>ผู้เล่น vs คู่ต่อสู้</div>
        <div>เกม</div>
        <div>ผล</div>
        <div>เวลา</div>
      </div>
      <div id="historyList"><div class="loading">กำลังโหลด...</div></div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://dqypnvrrmethwlzjebmg.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxeXBudnJybWV0aHdsemplYm1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTU5MTgsImV4cCI6MjA5MDQzMTkxOH0.jNHr3eDA6bCxSUJh6oG3rcnAoJVWGQNJiQhAzKtESIE'
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

let allResults = []
let currentGame = 'all'
let currentTab = 'leaderboard'

const gameNames = {
  tictactoe: '⭕ โอ-ซี',
  gomoku: '⚫ Gomoku',
  battleship: '🚢 Battle Ship',
  chess: '♟️ หมากรุก',
  uno: '🃏 UNO',
  '2048': '🔢 2048'
}

async function loadData() {
  const { data, error } = await db
    .from('game_results')
    .select('*')
    .order('created_at', { ascending: false })
    .limit(200)

  if (error) { console.error(error); return; }
  allResults = data || []
  renderLeaderboard()
  renderHistory()
}

function getStats(results) {
  const stats = {}
  results.forEach(r => {
    if (!stats[r.player_name]) {
      stats[r.player_name] = { name: r.player_name, wins: 0, losses: 0, draws: 0, total: 0 }
    }
    stats[r.player_name].total++
    if (r.result === 'win') stats[r.player_name].wins++
    else if (r.result === 'loss') stats[r.player_name].losses++
    else stats[r.player_name].draws++
  })
  return Object.values(stats).sort((a, b) => b.wins - a.wins || a.losses - b.losses)
}

function renderLeaderboard() {
  const filtered = currentGame === 'all' ? allResults : allResults.filter(r => r.game === currentGame)
  const stats = getStats(filtered)

  // Top 3
  const medals = ['🥇', '🥈', '🥉']
  const rankClass = ['rank-1', 'rank-2', 'rank-3']
  const top3El = document.getElementById('top3')
  if (stats.length === 0) {
    top3El.innerHTML = ''
  } else {
    top3El.innerHTML = stats.slice(0, 3).map((p, i) => `
      <div class="top3-card ${rankClass[i] || ''}">
        <span class="rank-badge">${medals[i] || '🏅'}</span>
        <div class="top3-name">${p.name}</div>
        <div class="top3-wins"><span>${p.wins}</span> ชนะ</div>
      </div>
    `).join('')
  }

  // Table
  const list = document.getElementById('leaderboardList')
  if (stats.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">🎮</span><div class="empty-text">ยังไม่มีข้อมูล เริ่มเล่นเกมก่อนนะครับ!</div></div>`
    return
  }
  list.innerHTML = stats.map((p, i) => `
    <div class="table-row leaderboard-grid">
      <div class="rank-num ${i < 3 ? 'top' : ''}">${i + 1}</div>
      <div class="player-info">
        <div class="player-avatar">${p.name[0].toUpperCase()}</div>
        <div class="player-display-name">${p.name}</div>
      </div>
      <div class="stat wins">${p.wins}</div>
      <div class="stat losses">${p.losses}</div>
      <div class="stat draws hide-mobile">${p.draws}</div>
    </div>
  `).join('')
}

function renderHistory(search = '') {
  const filtered = allResults.filter(r =>
    !search || r.player_name.toLowerCase().includes(search.toLowerCase()) ||
    r.opponent.toLowerCase().includes(search.toLowerCase())
  )
  const list = document.getElementById('historyList')
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">📋</span><div class="empty-text">${search ? 'ไม่พบผู้เล่นนี้' : 'ยังไม่มีประวัติการเล่น'}</div></div>`
    return
  }
  list.innerHTML = filtered.map(r => `
    <div class="table-row history-grid">
      <div class="player-info">
        <div class="player-avatar">${r.player_name[0].toUpperCase()}</div>
        <div>
          <div class="player-display-name">${r.player_name}</div>
          <div class="opponent-text" style="font-size:12px;color:var(--muted)">vs ${r.opponent}</div>
        </div>
      </div>
      <div class="game-tag">${gameNames[r.game] || r.game}</div>
      <div>
        <span class="result-badge result-${r.result}">
          ${r.result === 'win' ? '🎉 ชนะ' : r.result === 'loss' ? '😔 แพ้' : '🤝 เสมอ'}
        </span>
      </div>
      <div class="time-text">${timeAgo(r.created_at)}</div>
    </div>
  `).join('')
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime()
  const mins = Math.floor(diff / 60000)
  const hours = Math.floor(mins / 60)
  const days = Math.floor(hours / 24)
  if (mins < 1) return 'เพิ่งเล่น'
  if (mins < 60) return `${mins} นาทีที่แล้ว`
  if (hours < 24) return `${hours} ชั่วโมงที่แล้ว`
  return `${days} วันที่แล้ว`
}

function switchTab(tab, btn) {
  currentTab = tab
  document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('leaderboardTab').style.display = tab === 'leaderboard' ? 'block' : 'none'
  document.getElementById('historyTab').style.display = tab === 'history' ? 'block' : 'none'
}

function filterGame(game, btn) {
  currentGame = game
  document.querySelectorAll('#leaderboardTab .tabs .tab-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderLeaderboard()
}

function searchHistory() {
  renderHistory(document.getElementById('searchInput').value)
}

loadData()

// Realtime update
db.channel('leaderboard')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'game_results' }, () => {
    loadData()
  })
  .subscribe()
</script>
</body>
</html>
