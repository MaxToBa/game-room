<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard — GameRoom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;800&family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth-guard.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede8; --muted: #6b6880; --accent: #e8c547;
    --accent2: #7c6af5; --green: #4fcf8e; --red: #f05a5a;
    --font-display: 'DM Serif Display', serif;
    --font-ui: 'Syne', sans-serif; --font-th: 'Noto Sans Thai', sans-serif;
  }
  body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-th); padding: 32px 16px 80px; }
  .blob { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .blob-1 { width: 400px; height: 400px; background: rgba(124,106,245,0.1); top: -100px; right: -100px; }
  .blob-2 { width: 300px; height: 300px; background: rgba(232,197,71,0.06); bottom: 0; left: -80px; }
  .wrapper { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
  .back-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 999px; font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s; }
  .back-btn:hover { color: var(--text); border-color: var(--border-hover); }
  .page-title { font-family: var(--font-display); font-size: 32px; }

  /* Tabs */
  .tabs { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; }
  .tab-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 20px; border-radius: 999px; font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .tab-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .tab-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

  /* Top 3 */
  .top3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 32px; }
  .top3-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 24px 16px; text-align: center; position: relative; overflow: hidden; }
  .top3-card.rank-1 { border-color: rgba(232,197,71,0.4); background: linear-gradient(135deg, #1a1500 0%, #12121a 100%); }
  .top3-card.rank-2 { border-color: rgba(180,180,180,0.3); }
  .top3-card.rank-3 { border-color: rgba(180,100,50,0.3); }
  .rank-badge { font-size: 32px; margin-bottom: 8px; display: block; }
  .top3-name { font-family: var(--font-display); font-size: 18px; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .top3-wins { font-family: var(--font-ui); font-size: 13px; color: var(--muted); }
  .top3-wins span { color: var(--green); font-weight: 700; font-size: 20px; }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
  .table-header { display: grid; padding: 14px 20px; border-bottom: 1px solid var(--border); font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .table-header.lb-grid { grid-template-columns: 48px 1fr 80px 80px 80px; }
  .table-header.hist-grid { grid-template-columns: 1fr 100px 90px 130px; }
  .table-row { display: grid; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s; }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: rgba(255,255,255,0.02); }
  .table-row.lb-grid { grid-template-columns: 48px 1fr 80px 80px 80px; }
  .table-row.hist-grid { grid-template-columns: 1fr 100px 90px 130px; }
  .rank-num { font-family: var(--font-display); font-size: 18px; color: var(--muted); }
  .rank-num.top { color: var(--accent); }
  .player-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .player-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; overflow: hidden; }
  .player-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .player-display-name { font-weight: 600; font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .stat { font-family: var(--font-ui); font-size: 14px; font-weight: 600; }
  .stat.wins { color: var(--green); }
  .stat.losses { color: var(--red); }
  .stat.draws { color: var(--muted); }
  .result-badge { display: inline-flex; padding: 4px 12px; border-radius: 999px; font-family: var(--font-ui); font-size: 12px; font-weight: 700; }
  .result-win  { background: rgba(79,207,142,0.15); color: var(--green); }
  .result-loss { background: rgba(240,90,90,0.15);  color: var(--red); }
  .result-draw { background: rgba(107,104,128,0.2); color: var(--muted); }
  .game-tag { font-size: 12px; color: var(--muted); font-family: var(--font-ui); font-weight: 600; }
  .time-text { font-size: 12px; color: var(--muted); font-family: var(--font-ui); }
  .opponent-text { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; display: block; }
  .empty-text { font-size: 15px; margin-bottom: 16px; }
  .loading { text-align: center; padding: 40px; color: var(--muted); font-family: var(--font-ui); }

  /* Login notice banner */
  .login-notice {
    background: linear-gradient(135deg, rgba(124,106,245,0.1), rgba(124,106,245,0.05));
    border: 1px solid rgba(124,106,245,0.3);
    border-radius: 20px; padding: 40px 24px; text-align: center; margin-bottom: 8px;
  }
  .login-notice-icon { font-size: 48px; margin-bottom: 16px; display: block; }
  .login-notice-title { font-family: var(--font-display); font-size: 24px; margin-bottom: 8px; }
  .login-notice-sub { color: var(--muted); font-size: 15px; line-height: 1.6; margin-bottom: 24px; }
  .login-btn {
    display: inline-block; background: var(--accent2); color: #fff;
    padding: 12px 28px; border-radius: 14px; font-family: var(--font-ui);
    font-size: 15px; font-weight: 700; text-decoration: none; cursor: pointer;
    border: none; transition: all 0.2s;
  }
  .login-btn:hover { background: #9d8fff; transform: translateY(-1px); }

  /* Personal stats cards */
  .personal-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px 14px; text-align: center; }
  .stat-card-val { font-family: var(--font-display); font-size: 28px; margin-bottom: 4px; }
  .stat-card-val.green { color: var(--green); }
  .stat-card-val.red { color: var(--red); }
  .stat-card-val.muted { color: var(--muted); }
  .stat-card-label { font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }

  /* Sub-game filter */
  .game-filter { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .filter-btn { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 6px 14px; border-radius: 999px; font-family: var(--font-ui); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .filter-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .filter-btn.active { background: var(--surface2); color: var(--text); border-color: var(--border-hover); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.4s ease both; }
  @media (max-width: 600px) {
    .top3 { grid-template-columns: 1fr; }
    .table-header.lb-grid, .table-row.lb-grid { grid-template-columns: 40px 1fr 60px 60px; }
    .table-header.lb-grid .hide-mobile, .table-row.lb-grid .hide-mobile { display: none; }
    .table-header.hist-grid, .table-row.hist-grid { grid-template-columns: 1fr 80px 90px; }
    .table-header.hist-grid .hide-mobile, .table-row.hist-grid .hide-mobile { display: none; }
    .personal-stats { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="wrapper">
  <div class="top-bar">
    <a href="index.html" class="back-btn">← กลับ</a>
    <div class="page-title">🏆 Leaderboard</div>
    <div style="width:80px"></div>
  </div>

  <!-- Main Tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tabBtnLb" onclick="switchTab('leaderboard')">🏆 อันดับรวม</button>
    <button class="tab-btn" id="tabBtnHist" onclick="switchTab('history')">👤 ประวัติของฉัน</button>
  </div>

  <!-- ─── Leaderboard Tab ─── -->
  <div id="leaderboardTab" class="fade-up">
    <div class="game-filter">
      <button class="filter-btn active" onclick="filterGame('all', this)">ทั้งหมด</button>
      <button class="filter-btn" onclick="filterGame('tictactoe', this)">⭕ โอ-ซี</button>
      <button class="filter-btn" onclick="filterGame('gomoku', this)">⚫ Gomoku</button>
      <button class="filter-btn" onclick="filterGame('battleship', this)">⚓ Battleship</button>
      <button class="filter-btn" onclick="filterGame('uno', this)">🃏 UNO</button>
      <button class="filter-btn" onclick="filterGame('checkers', this)">🔴 หมากฮอส</button>
      <button class="filter-btn" onclick="filterGame('connect-four', this)">🔵 Connect 4</button>
      <button class="filter-btn" onclick="filterGame('2048', this)">🔢 2048</button>
    </div>
    <div class="top3" id="top3"></div>
    <div class="table-wrap">
      <div class="table-header lb-grid">
        <div>#</div>
        <div>ผู้เล่น</div>
        <div>ชนะ</div>
        <div>แพ้</div>
        <div class="hide-mobile">เสมอ</div>
      </div>
      <div id="leaderboardList"><div class="loading">กำลังโหลด...</div></div>
    </div>
  </div>

  <!-- ─── Personal History Tab ─── -->
  <div id="historyTab" style="display:none" class="fade-up">
    <!-- Guest notice -->
    <div id="guestNotice" style="display:none">
      <div class="login-notice">
        <span class="login-notice-icon">🔒</span>
        <div class="login-notice-title">เข้าสู่ระบบก่อนนะ</div>
        <div class="login-notice-sub">ประวัติการเล่นส่วนตัวจะโชว์เฉพาะสำหรับ<br>ผู้เล่นที่เข้าสู่ระบบแล้วเท่านั้น</div>
        <a href="login.html?ref=history" class="login-btn">🔑 เข้าสู่ระบบ / สมัครสมาชิก</a>
      </div>
    </div>
    <!-- Logged-in personal history -->
    <div id="personalHistory" style="display:none">
      <div class="personal-stats" id="personalStats"></div>
      <div class="game-filter" id="historyGameFilter">
        <button class="filter-btn active" onclick="filterHistory('all', this)">ทั้งหมด</button>
        <button class="filter-btn" onclick="filterHistory('tictactoe', this)">⭕ โอ-ซี</button>
        <button class="filter-btn" onclick="filterHistory('gomoku', this)">⚫ Gomoku</button>
        <button class="filter-btn" onclick="filterHistory('battleship', this)">⚓ Battleship</button>
        <button class="filter-btn" onclick="filterHistory('uno', this)">🃏 UNO</button>
        <button class="filter-btn" onclick="filterHistory('checkers', this)">🔴 หมากฮอส</button>
        <button class="filter-btn" onclick="filterHistory('connect-four', this)">🔵 Connect 4</button>
        <button class="filter-btn" onclick="filterHistory('2048', this)">🔢 2048</button>
      </div>
      <div class="table-wrap">
        <div class="table-header hist-grid">
          <div>คู่ต่อสู้</div>
          <div>เกม</div>
          <div>ผล</div>
          <div class="hide-mobile">เวลา</div>
        </div>
        <div id="historyList"><div class="loading">กำลังโหลด...</div></div>
      </div>
    </div>
  </div>
</div>

<script>
// db comes from js/supabase.js

const GAME_NAMES = {
  tictactoe: '⭕ โอ-ซี',
  gomoku: '⚫ Gomoku',
  battleship: '⚓ Battleship',
  uno: '🃏 UNO',
  checkers: '🔴 หมากฮอส',
  'connect-four': '🔵 Connect 4',
  '2048': '🔢 2048',
}

let allResults = []         // public leaderboard data
let myResults = []          // personal history
let mySession = null
let currentLbGame = 'all'
let currentHistGame = 'all'

async function init() {
  const { data } = await db.auth.getSession()
  mySession = data?.session || null
  await loadPublicData()
  if (currentTab === 'history') await loadPersonalHistory()
}

let currentTab = 'leaderboard'

async function loadPublicData() {
  const { data } = await db
    .from('game_results')
    .select('player_name, game, result')
    .order('created_at', { ascending: false })
    .limit(500)
  allResults = data || []
  renderLeaderboard()
}

async function loadPersonalHistory() {
  if (!mySession) {
    document.getElementById('guestNotice').style.display = 'block'
    document.getElementById('personalHistory').style.display = 'none'
    return
  }
  document.getElementById('guestNotice').style.display = 'none'
  document.getElementById('personalHistory').style.display = 'block'

  const { data } = await db
    .from('game_results')
    .select('*')
    .eq('user_id', mySession.user.id)
    .order('created_at', { ascending: false })
    .limit(200)
  myResults = data || []
  renderPersonalStats()
  renderHistoryList()
}

// ─── Leaderboard ───────────────────────────────────────────
function getStats(results) {
  const stats = {}
  results.forEach(r => {
    if (!r.player_name) return
    if (!stats[r.player_name]) stats[r.player_name] = { name: r.player_name, wins: 0, losses: 0, draws: 0 }
    if (r.result === 'win') stats[r.player_name].wins++
    else if (r.result === 'loss') stats[r.player_name].losses++
    else stats[r.player_name].draws++
  })
  return Object.values(stats).sort((a, b) => b.wins - a.wins || a.losses - b.losses)
}

function renderLeaderboard() {
  const filtered = currentLbGame === 'all' ? allResults : allResults.filter(r => r.game === currentLbGame)
  const stats = getStats(filtered)

  const medals = ['🥇', '🥈', '🥉']
  const rankClass = ['rank-1', 'rank-2', 'rank-3']
  const top3El = document.getElementById('top3')
  top3El.innerHTML = stats.slice(0, 3).map((p, i) => `
    <div class="top3-card ${rankClass[i] || ''}">
      <span class="rank-badge">${medals[i] || '🏅'}</span>
      <div class="top3-name">${_esc(p.name)}</div>
      <div class="top3-wins"><span>${p.wins}</span> ชนะ</div>
    </div>
  `).join('')

  const list = document.getElementById('leaderboardList')
  if (stats.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">🎮</span><div class="empty-text">ยังไม่มีข้อมูล เริ่มเล่นเกมก่อนนะ!</div></div>`
    return
  }
  list.innerHTML = stats.map((p, i) => `
    <div class="table-row lb-grid">
      <div class="rank-num ${i < 3 ? 'top' : ''}">${i + 1}</div>
      <div class="player-info">
        <div class="player-avatar">${_esc(p.name[0].toUpperCase())}</div>
        <div class="player-display-name">${_esc(p.name)}</div>
      </div>
      <div class="stat wins">${p.wins}</div>
      <div class="stat losses">${p.losses}</div>
      <div class="stat draws hide-mobile">${p.draws}</div>
    </div>
  `).join('')
}

function filterGame(game, btn) {
  currentLbGame = game
  document.querySelectorAll('#leaderboardTab .filter-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderLeaderboard()
}

// ─── Personal History ───────────────────────────────────────
function renderPersonalStats() {
  const filtered = currentHistGame === 'all' ? myResults : myResults.filter(r => r.game === currentHistGame)
  const wins = filtered.filter(r => r.result === 'win').length
  const losses = filtered.filter(r => r.result === 'loss').length
  const draws = filtered.filter(r => r.result === 'draw').length
  document.getElementById('personalStats').innerHTML = `
    <div class="stat-card"><div class="stat-card-val green">${wins}</div><div class="stat-card-label">ชนะ</div></div>
    <div class="stat-card"><div class="stat-card-val red">${losses}</div><div class="stat-card-label">แพ้</div></div>
    <div class="stat-card"><div class="stat-card-val muted">${draws}</div><div class="stat-card-label">เสมอ</div></div>
  `
}

function renderHistoryList() {
  const filtered = currentHistGame === 'all' ? myResults : myResults.filter(r => r.game === currentHistGame)
  const list = document.getElementById('historyList')
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><span class="empty-icon">🎮</span><div class="empty-text">ยังไม่มีประวัติเกม${currentHistGame !== 'all' ? 'นี้' : ''}</div></div>`
    return
  }
  list.innerHTML = filtered.map(r => `
    <div class="table-row hist-grid">
      <div class="player-info">
        <div class="player-avatar">${r.opponent ? _esc(r.opponent[0].toUpperCase()) : '?'}</div>
        <div>
          <div class="player-display-name">vs ${_esc(r.opponent || '?')}</div>
          <div class="opponent-text">${_esc(r.player_name || '')}</div>
        </div>
      </div>
      <div class="game-tag">${GAME_NAMES[r.game] || _esc(r.game || '')}</div>
      <div>
        <span class="result-badge result-${r.result}">
          ${r.result === 'win' ? '🎉 ชนะ' : r.result === 'loss' ? '😔 แพ้' : '🤝 เสมอ'}
        </span>
      </div>
      <div class="time-text hide-mobile">${timeAgo(r.created_at)}</div>
    </div>
  `).join('')
}

function filterHistory(game, btn) {
  currentHistGame = game
  document.querySelectorAll('#historyGameFilter .filter-btn').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  renderPersonalStats()
  renderHistoryList()
}

// ─── Tab switching ──────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab
  document.getElementById('tabBtnLb').classList.toggle('active', tab === 'leaderboard')
  document.getElementById('tabBtnHist').classList.toggle('active', tab === 'history')
  document.getElementById('leaderboardTab').style.display = tab === 'leaderboard' ? 'block' : 'none'
  document.getElementById('historyTab').style.display = tab === 'history' ? 'block' : 'none'
  if (tab === 'history') loadPersonalHistory()
}

// ─── Helpers ────────────────────────────────────────────────
function timeAgo(dateStr) {
  if (!dateStr) return ''
  const diff = Date.now() - new Date(dateStr).getTime()
  const mins = Math.floor(diff / 60000)
  const hours = Math.floor(mins / 60)
  const days = Math.floor(hours / 24)
  if (mins < 1) return 'เพิ่งเล่น'
  if (mins < 60) return `${mins} นาทีที่แล้ว`
  if (hours < 24) return `${hours} ชั่วโมงที่แล้ว`
  return `${days} วันที่แล้ว`
}

function _esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// Realtime: reload on new game results
db.channel('leaderboard-realtime')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'game_results' }, () => {
    loadPublicData()
    if (currentTab === 'history' && mySession) loadPersonalHistory()
  })
  .subscribe()

init()
</script>
</body>
</html>
