<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ — GameRoom</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Syne:wght@400;600;800&family=Noto+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: rgba(255,255,255,0.07); --border-hover: rgba(255,255,255,0.18);
    --text: #f0ede8; --muted: #6b6880; --accent: #e8c547;
    --accent2: #7c6af5; --green: #4fcf8e;
    --font-display: 'DM Serif Display', serif;
    --font-ui: 'Syne', sans-serif; --font-th: 'Noto Sans Thai', sans-serif;
  }
  body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--font-th); display: flex; align-items: center; justify-content: center; padding: 24px; }
  .blob { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
  .blob-1 { width: 500px; height: 500px; background: rgba(124,106,245,0.12); top: -150px; right: -100px; }
  .blob-2 { width: 400px; height: 400px; background: rgba(232,197,71,0.07); bottom: 0; left: -100px; }

  .card { position: relative; z-index: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px; width: 100%; max-width: 420px; animation: fadeUp 0.5s ease both; }

  .logo { font-family: var(--font-display); font-size: 22px; display: flex; align-items: center; gap: 8px; margin-bottom: 32px; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }

  .tabs { display: flex; background: var(--surface2); border-radius: 12px; padding: 4px; gap: 4px; margin-bottom: 28px; }
  .tab { flex: 1; padding: 10px; border: none; background: transparent; color: var(--muted); font-family: var(--font-ui); font-size: 13px; font-weight: 600; border-radius: 9px; cursor: pointer; transition: all 0.2s; }
  .tab.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

  .section { display: none; }
  .section.active { display: block; }

  .section-title { font-family: var(--font-display); font-size: 26px; margin-bottom: 6px; }
  .section-sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.6; }

  .form-group { margin-bottom: 16px; }
  .form-label { display: block; font-family: var(--font-ui); font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 13px 16px; color: var(--text); font-family: var(--font-th); font-size: 15px; outline: none; transition: border-color 0.2s; }
  .form-input:focus { border-color: var(--accent2); }
  .form-input::placeholder { color: var(--muted); }

  .submit-btn { width: 100%; background: var(--accent2); color: #fff; border: none; padding: 14px; border-radius: 12px; font-family: var(--font-ui); font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
  .submit-btn:hover { background: #9d8fff; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: var(--muted); font-size: 13px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .google-btn { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--text); padding: 13px; border-radius: 12px; font-family: var(--font-ui); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .google-btn:hover { border-color: var(--border-hover); background: rgba(255,255,255,0.04); }

  .guest-btn { width: 100%; background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 13px; border-radius: 12px; font-family: var(--font-ui); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
  .guest-btn:hover { border-color: var(--border-hover); color: var(--text); }

  .error-msg { background: rgba(240,90,90,0.1); border: 1px solid rgba(240,90,90,0.3); color: #f05a5a; padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; display: none; }
  .success-msg { background: rgba(79,207,142,0.1); border: 1px solid rgba(79,207,142,0.3); color: var(--green); padding: 12px 16px; border-radius: 10px; font-size: 14px; margin-bottom: 16px; display: none; }

  .back-link { display: block; text-align: center; margin-top: 20px; color: var(--muted); font-size: 13px; text-decoration: none; transition: color 0.2s; }
  .back-link:hover { color: var(--text); }

  /* Guest name screen */
  .guest-screen { display: none; }
  .guest-screen.show { display: block; }
  .main-screen { display: block; }
  .main-screen.hide { display: none; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="card">
  <div class="logo"><span class="logo-dot"></span>GameRoom</div>

  <!-- Main screen -->
  <div class="main-screen" id="mainScreen">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login', this)">เข้าสู่ระบบ</button>
      <button class="tab" onclick="switchTab('register', this)">สมัครสมาชิก</button>
    </div>

    <!-- Login -->
    <div class="section active" id="loginSection">
      <div class="section-title">ยินดีต้อนรับ</div>
      <div class="section-sub">เข้าสู่ระบบเพื่อบันทึกคะแนนและประวัติการเล่น</div>
      <div class="error-msg" id="loginError"></div>
      <div class="form-group">
        <label class="form-label">อีเมล</label>
        <input class="form-input" id="loginEmail" type="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">รหัสผ่าน</label>
        <input class="form-input" id="loginPassword" type="password" placeholder="••••••••">
      </div>
      <button class="submit-btn" id="loginBtn" onclick="handleLogin()">เข้าสู่ระบบ →</button>
      <div class="divider">หรือ</div>
      <button class="google-btn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        เข้าสู่ระบบด้วย Google
      </button>
      <button class="guest-btn" onclick="showGuestScreen()">👤 เล่นเป็นผู้เยี่ยมชม (ไม่ต้องสมัคร)</button>
    </div>

    <!-- Register -->
    <div class="section" id="registerSection">
      <div class="section-title">สมัครสมาชิก</div>
      <div class="section-sub">สร้างบัญชีเพื่อบันทึกคะแนนและแข่งกับคนอื่น</div>
      <div class="error-msg" id="registerError"></div>
      <div class="success-msg" id="registerSuccess"></div>
      <div class="form-group">
        <label class="form-label">ชื่อในเกม</label>
        <input class="form-input" id="registerName" placeholder="เช่น MaxToBa" maxlength="16">
      </div>
      <div class="form-group">
        <label class="form-label">อีเมล</label>
        <input class="form-input" id="registerEmail" type="email" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label class="form-label">รหัสผ่าน</label>
        <input class="form-input" id="registerPassword" type="password" placeholder="อย่างน้อย 6 ตัวอักษร">
      </div>
      <button class="submit-btn" id="registerBtn" onclick="handleRegister()">สมัครสมาชิก →</button>
      <div class="divider">หรือ</div>
      <button class="google-btn" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        สมัครด้วย Google
      </button>
    </div>
  </div>

  <!-- Guest screen -->
  <div class="guest-screen" id="guestScreen">
    <div class="section-title" style="margin-bottom:8px">เล่นเป็นผู้เยี่ยมชม</div>
    <div class="section-sub">ใส่ชื่อที่อยากใช้ในเกม ไม่ต้องสมัครสมาชิก</div>
    <div class="form-group">
      <label class="form-label">ชื่อในเกม</label>
      <input class="form-input" id="guestName" placeholder="เช่น MaxToBa" maxlength="16">
    </div>
    <button class="submit-btn" onclick="handleGuest()">เข้าเล่นเลย →</button>
    <button class="guest-btn" onclick="hideGuestScreen()" style="margin-top:8px">← ย้อนกลับ</button>
  </div>

  <a href="index.html" class="back-link">← กลับหน้าหลัก</a>
</div>

<script>
const SUPABASE_URL = 'https://dqypnvrrmethwlzjebmg.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRxeXBudnJybWV0aHdsemplYm1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ4NTU5MTgsImV4cCI6MjA5MDQzMTkxOH0.jNHr3eDA6bCxSUJh6oG3rcnAoJVWGQNJiQhAzKtESIE'
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

// เช็คว่า login อยู่แล้วไหม
db.auth.getSession().then(({ data }) => {
  if (data.session) {
    window.location.href = 'index.html'
  }
})

// เช็ค Google callback
db.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    // บันทึกชื่อจาก Google
    const name = session.user.user_metadata?.full_name?.split(' ')[0] || session.user.email.split('@')[0]
    localStorage.setItem('playerName', name)
    localStorage.setItem('playerEmail', session.user.email)
    localStorage.setItem('isGuest', 'false')
    window.location.href = 'index.html'
  }
})

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'))
  btn.classList.add('active')
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
  document.getElementById(tab + 'Section').classList.add('active')
}

async function handleLogin() {
  const email = document.getElementById('loginEmail').value.trim()
  const password = document.getElementById('loginPassword').value
  const btn = document.getElementById('loginBtn')
  const errEl = document.getElementById('loginError')

  if (!email || !password) { showError(errEl, 'กรุณากรอกข้อมูลให้ครบ'); return; }

  btn.disabled = true
  btn.textContent = 'กำลังเข้าสู่ระบบ...'

  const { data, error } = await db.auth.signInWithPassword({ email, password })

  if (error) {
    showError(errEl, 'อีเมลหรือรหัสผ่านไม่ถูกต้อง')
    btn.disabled = false
    btn.textContent = 'เข้าสู่ระบบ →'
    return
  }

  const name = data.user.user_metadata?.display_name || email.split('@')[0]
  localStorage.setItem('playerName', name)
  localStorage.setItem('playerEmail', email)
  localStorage.setItem('isGuest', 'false')
  window.location.href = 'index.html'
}

async function handleRegister() {
  const name = document.getElementById('registerName').value.trim()
  const email = document.getElementById('registerEmail').value.trim()
  const password = document.getElementById('registerPassword').value
  const btn = document.getElementById('registerBtn')
  const errEl = document.getElementById('registerError')
  const sucEl = document.getElementById('registerSuccess')

  if (!name || !email || !password) { showError(errEl, 'กรุณากรอกข้อมูลให้ครบ'); return; }
  if (password.length < 6) { showError(errEl, 'รหัสผ่านต้องมีอย่างน้อย 6 ตัวอักษร'); return; }

  btn.disabled = true
  btn.textContent = 'กำลังสมัคร...'

  const { data, error } = await db.auth.signUp({
    email, password,
    options: { data: { display_name: name } }
  })

  if (error) {
    showError(errEl, 'สมัครไม่สำเร็จ: ' + error.message)
    btn.disabled = false
    btn.textContent = 'สมัครสมาชิก →'
    return
  }

  localStorage.setItem('playerName', name)
  localStorage.setItem('playerEmail', email)
  localStorage.setItem('isGuest', 'false')
  errEl.style.display = 'none'
  sucEl.style.display = 'block'
  sucEl.textContent = '✅ สมัครสำเร็จ! กรุณาเช็คอีเมลเพื่อยืนยันบัญชี แล้วกลับมา Login ได้เลย'
  btn.disabled = false
  btn.textContent = 'สมัครสมาชิก →'
}

async function handleGoogle() {
  await db.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/' }
  })
}

function showGuestScreen() {
  document.getElementById('mainScreen').classList.add('hide')
  document.getElementById('guestScreen').classList.add('show')
}

function hideGuestScreen() {
  document.getElementById('mainScreen').classList.remove('hide')
  document.getElementById('guestScreen').classList.remove('show')
}

function handleGuest() {
  const name = document.getElementById('guestName').value.trim()
  if (!name) { alert('กรุณาใส่ชื่อก่อนนะครับ'); return; }
  localStorage.setItem('playerName', name)
  localStorage.setItem('isGuest', 'true')
  window.location.href = 'index.html'
}

function showError(el, msg) {
  el.textContent = msg
  el.style.display = 'block'
}
</script>
</body>
</html>
